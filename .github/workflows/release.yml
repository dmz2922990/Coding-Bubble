name: Release

on:
  push:
    tags: ['v*']

jobs:
  build-remote-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - run: pnpm --filter @coding-bubble/remote build
      - name: Package standalone binary
        run: |
          cd packages/remote
          npx pkg dist/server.js -t node20-linux-x64 -o dist/bin/coding-bubble-remote
          chmod +x dist/bin/coding-bubble-remote-linux-x64
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: remote-linux-x64
          path: packages/remote/dist/bin/coding-bubble-remote-linux-x64

  build-remote-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - run: pnpm --filter @coding-bubble/remote build
      - name: Package standalone binary
        run: |
          cd packages/remote
          npx pkg dist/server.js -t node20-win-x64 -o dist/bin/coding-bubble-remote.exe
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: remote-win-x64
          path: packages/remote/dist/bin/coding-bubble-remote.exe

  build-remote-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - run: pnpm --filter @coding-bubble/remote build
      - name: Package standalone binary (x64)
        run: |
          cd packages/remote
          npx pkg dist/server.js -t node20-mac-x64 -o dist/bin/coding-bubble-remote-mac-x64
      - name: Package standalone binary (arm64)
        run: |
          cd packages/remote
          npx pkg dist/server.js -t node20-mac-arm64 -o dist/bin/coding-bubble-remote-mac-arm64
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: remote-mac
          path: |
            packages/remote/dist/bin/coding-bubble-remote-mac-x64
            packages/remote/dist/bin/coding-bubble-remote-mac-arm64

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - name: Build & Package (macOS)
        run: pnpm --filter @coding-bubble/desktop run package:mac
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-mac
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - name: Build & Package (Windows)
        run: pnpm --filter @coding-bubble/desktop run package:win
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-win
          path: |
            apps/desktop/release/*.exe

  publish:
    needs: [build-mac, build-win, build-remote-linux, build-remote-win, build-remote-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: find dist -type f | head -20

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          draft: false
          generate_release_notes: true
